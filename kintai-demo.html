<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勤怠管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
      --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 8px; --radius-lg: 12px;
      --danger: #e24b4a; --warn: #ef9f27; --green: #1d9e75;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #323230;
        --text: #f0f0ec; --text2: #a8a8a4; --text3: #6e6e6a;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 24px 16px; }
    .app { max-width: 780px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 14px; }
    .settings-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .settings-row label { font-size: 14px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
    .settings-row input[type="number"] { width: 90px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 8px; font-size: 14px; background: var(--bg); color: var(--text); }
    .settings-row input[type="number"]:focus { outline: none; box-shadow: 0 0 0 2px #378add44; }

    /* 有給パネル */
    .paid-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 14px; }
    .paid-panel-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .paid-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    @media (max-width: 500px) { .paid-grid { grid-template-columns: repeat(2, 1fr); } }
    .paid-cell { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
    .paid-cell-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .paid-cell-val { font-size: 22px; font-weight: 500; color: var(--text); }
    .paid-cell-val.ok { color: var(--green); }
    .paid-cell-val.warn { color: var(--warn); }
    .paid-cell-val.danger { color: var(--danger); }
    .paid-cell-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .paid-input { width: 64px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 4px 6px; font-size: 15px; background: var(--bg); color: var(--text); text-align: center; }
    .paid-input:focus { outline: none; box-shadow: 0 0 0 2px #378add44; }

    .bulk-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .bulk-label { font-size: 13px; color: var(--text2); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .bulk-sep { font-size: 13px; color: var(--text3); }
    .bulk-checks { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .bulk-checks label { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .btn-bulk { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 16px; font-size: 13px; color: var(--text); cursor: pointer; white-space: nowrap; font-family: inherit; }
    .btn-bulk:hover { border-color: var(--text3); }
    .btn-bulk:active { transform: scale(0.98); }
    .month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .month-nav button { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 7px 14px; cursor: pointer; font-size: 15px; color: var(--text); font-family: inherit; }
    .month-nav button:hover { background: var(--bg2); }
    .month-label { font-size: 18px; font-weight: 500; color: var(--text); min-width: 130px; text-align: center; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
    @media (max-width: 500px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
    .metric { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; }
    .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 500; color: var(--text); }
    .metric-value.overtime { color: var(--danger); }
    .metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .bar-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .bar-track { background: var(--bg2); border-radius: 4px; height: 9px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; background: var(--green); }
    .bar-fill.warn { background: var(--warn); }
    .bar-fill.danger { background: var(--danger); }
    .table-wrap { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow-x: auto; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 620px; }
    thead th { background: var(--bg2); padding: 9px 8px; text-align: left; font-weight: 500; font-size: 11px; color: var(--text2); border-bottom: 0.5px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 0.5px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg2); }
    tbody td { padding: 5px 8px; color: var(--text); vertical-align: middle; }
    .overtime-cell { color: var(--danger); font-weight: 500; }
    .time-input { width: 52px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 3px 4px; font-size: 12px; background: var(--bg); color: var(--text); text-align: center; font-family: monospace; letter-spacing: 0.5px; }
    .time-input:focus { outline: none; box-shadow: 0 0 0 2px #378add44; border-color: #378add; }
    .time-input.error { border-color: var(--danger); background: #fcebeb; }
    .time-input-lg { width: 62px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 6px; font-size: 14px; background: var(--bg); color: var(--text); text-align: center; font-family: monospace; }
    .time-input-lg:focus { outline: none; box-shadow: 0 0 0 2px #378add44; border-color: #378add; }
    .break-input { width: 46px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 3px 4px; font-size: 12px; background: var(--bg); color: var(--text); text-align: center; }
    .break-input:focus { outline: none; box-shadow: 0 0 0 2px #378add44; }
    select { border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 3px 5px; font-size: 11px; background: var(--bg); color: var(--text); cursor: pointer; }
    .away-wrap { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .away-pair { display: flex; align-items: center; gap: 2px; }
    .away-sep { font-size: 11px; color: var(--text3); }
    .btn-add-away { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 2px 7px; font-size: 11px; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; }
    .btn-add-away:hover { background: var(--bg2); }
    .btn-del-away { background: none; border: none; padding: 0 2px; font-size: 13px; color: var(--text3); cursor: pointer; line-height: 1; }
    .btn-del-away:hover { color: var(--danger); }
    .away-total { font-size: 11px; color: var(--danger); white-space: nowrap; }
    .hint { font-size: 11px; color: var(--text3); padding-left: 4px; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: var(--bg); font-size: 13px; padding: 9px 22px; border-radius: 20px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .reset-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .reset-panel-text { font-size: 13px; color: var(--text2); }
    .btn-reset { background: none; border: 0.5px solid var(--danger); border-radius: var(--radius); padding: 7px 18px; font-size: 13px; color: var(--danger); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .btn-reset:hover { background: #fcebeb; }
  </style>
</head>
<body>
<div class="app">
  <h1><i class="ti ti-clock"></i>勤怠管理</h1>
  <p class="subtitle">勤務時間・残業・離席・有給を一括管理</p>

  <!-- 有給残日数パネル -->
  <div class="paid-panel">
    <div class="paid-panel-title"><i class="ti ti-beach" style="font-size:15px;"></i>有給休暇の残日数</div>
    <div class="paid-grid">
      <div class="paid-cell">
        <div class="paid-cell-label">前年繰越</div>
        <input class="paid-input" type="number" id="paidCarry" value="0" min="0" max="40" step="0.5" onchange="savePaidSettings(); updatePaidDisplay()">
        <div class="paid-cell-sub">日</div>
      </div>
      <div class="paid-cell">
        <div class="paid-cell-label">今年付与</div>
        <input class="paid-input" type="number" id="paidGrant" value="0" min="0" max="40" step="0.5" onchange="savePaidSettings(); updatePaidDisplay()">
        <div class="paid-cell-sub">日</div>
      </div>
      <div class="paid-cell">
        <div class="paid-cell-label">使用済み（自動）</div>
        <div class="paid-cell-val" id="paidUsed">0</div>
        <div class="paid-cell-sub">日</div>
      </div>
      <div class="paid-cell">
        <div class="paid-cell-label">残日数</div>
        <div class="paid-cell-val ok" id="paidRemain">0</div>
        <div class="paid-cell-sub">日</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="settings-row">
      <label>時給 <input type="number" id="hourlyRate" value="1500" min="0" step="10"> 円</label>
      <label>所定労働時間 <input type="number" id="stdHours" value="8" min="1" max="12" step="0.5"> 時間/日</label>
    </div>
  </div>

  <div class="bulk-panel">
    <span class="bulk-label"><i class="ti ti-settings" style="font-size:15px;"></i>一括変更</span>
    <input class="time-input-lg" type="text" id="bulkStart" value="08:30" maxlength="5" oninput="autoColon(this)" placeholder="08:30">
    <span class="bulk-sep">〜</span>
    <input class="time-input-lg" type="text" id="bulkEnd" value="17:30" maxlength="5" oninput="autoColon(this)" placeholder="17:30">
    <div class="bulk-checks">
      <label><input type="checkbox" id="bulkWeekday" checked> 平日のみ</label>
      <label><input type="checkbox" id="bulkSkipHoliday" checked> 有給・休日は除く</label>
    </div>
    <button class="btn-bulk" onclick="applyBulk()"><i class="ti ti-refresh" style="font-size:13px; vertical-align:-1px; margin-right:4px;"></i>この月に適用</button>
  </div>

  <div class="month-nav">
    <button onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
  </div>

  <div class="summary-grid">
    <div class="metric">
      <div class="metric-label"><i class="ti ti-calendar-stats"></i> 出勤日数</div>
      <div class="metric-value" id="sumDays">0</div>
      <div class="metric-sub">日</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-clock"></i> 総勤務時間</div>
      <div class="metric-value" id="sumHours">0</div>
      <div class="metric-sub">時間</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-alarm"></i> 残業時間</div>
      <div class="metric-value overtime" id="sumOT">0分</div>
      <div class="metric-sub">1分単位</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-coin-yen"></i> 推定給与</div>
      <div class="metric-value" id="sumPay">0</div>
      <div class="metric-sub">円</div>
    </div>
  </div>

  <div class="card">
    <div class="bar-label">
      <span><i class="ti ti-alarm"></i> 今月の残業進捗</span>
      <span id="otBarLabel">0分 / 45時間</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="otBar" style="width:0%"></div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:72px;">日付</th>
          <th style="width:66px;">種別</th>
          <th style="width:54px;">開始</th>
          <th style="width:54px;">終了</th>
          <th style="width:52px;">休憩(分)</th>
          <th>離席（開始〜終了）</th>
          <th style="width:74px;">勤務時間</th>
          <th style="width:68px;">残業</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <p class="hint">時刻は「HH:MM」形式で入力（例: 09:00、18:30）　離席は＋ボタンで複数追加できます</p>

  <!-- リセットパネル -->
  <div class="reset-panel">
    <div class="reset-panel-text">
      <strong>データをリセット</strong><br>
      <span style="font-size:12px;">すべての勤怠・設定データを削除します。この操作は元に戻せません。</span>
    </div>
    <button class="btn-reset" onclick="resetAllData()">
      <i class="ti ti-trash" style="font-size:15px;"></i> リセット
    </button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbw-jMbYwuCZUbi7AAQ-39MnVG2WQCNVTixj-WAyO2oDWQv_OxMC0V4Az1y0Y9cZM0HO/exec';
var currentYear, currentMonth;
var records = {};
var allRecords = {}; // 全月データキャッシュ（有給集計用）
var saving = false;

function init() {
  var now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  loadSettings();
}

function loadSettings() {
  showToast('データを読み込み中...');
  fetch(GAS_URL + '?action=loadSettings')
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.settings) {
        if (res.settings.rate) document.getElementById('hourlyRate').value = res.settings.rate;
        if (res.settings.hours) document.getElementById('stdHours').value = res.settings.hours;
        if (res.settings.paidCarry !== undefined) document.getElementById('paidCarry').value = res.settings.paidCarry;
        if (res.settings.paidGrant !== undefined) document.getElementById('paidGrant').value = res.settings.paidGrant;
      }
      loadAllPaidData();
    })
    .catch(function() { loadFromStorage(); });
}

function saveSettings() {
  var rate = document.getElementById('hourlyRate').value;
  var hours = document.getElementById('stdHours').value;
  var paidCarry = document.getElementById('paidCarry').value;
  var paidGrant = document.getElementById('paidGrant').value;
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'saveSettings', rate: rate, hours: hours, paidCarry: paidCarry, paidGrant: paidGrant })
  }).catch(function() {});
}

function savePaidSettings() {
  saveSettings();
}

// 全月の有給使用日数を集計するため全データを読み込む
function loadAllPaidData() {
  fetch(GAS_URL + '?action=loadAllPaid&year=' + currentYear)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      allRecords = res.data || {};
      loadFromStorage();
    })
    .catch(function() { loadFromStorage(); });
}

// 今年の有給使用合計を全月から計算
function calcTotalPaidUsed() {
  var total = 0;
  for (var m = 0; m <= 11; m++) {
    var monthData = allRecords[m] || {};
    // 現在表示中の月は最新データを使う
    if (m === currentMonth) monthData = records;
    for (var key in monthData) {
      if (monthData[key] && monthData[key].type === 'paid') total++;
    }
  }
  return total;
}

function updatePaidDisplay() {
  var carry = parseFloat(document.getElementById('paidCarry').value) || 0;
  var grant = parseFloat(document.getElementById('paidGrant').value) || 0;
  var total = carry + grant;
  var used = calcTotalPaidUsed();
  var remain = total - used;

  document.getElementById('paidUsed').textContent = used;
  var remainEl = document.getElementById('paidRemain');
  remainEl.textContent = remain;
  remainEl.className = 'paid-cell-val ' + (remain <= 0 ? 'danger' : remain <= 3 ? 'warn' : 'ok');
}

function loadFromStorage() {
  showToast('データを読み込み中...');
  fetch(GAS_URL + '?action=load&year=' + currentYear + '&month=' + currentMonth)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      records = res.data || {};
      allRecords[currentMonth] = records;
      render();
      updatePaidDisplay();
      showToast('読み込み完了');
    })
    .catch(function() {
      records = {};
      render();
      updatePaidDisplay();
      showToast('オフラインモードで表示中');
    });
}

function saveToStorage() {
  if (saving) return;
  saving = true;
  allRecords[currentMonth] = records;
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'save', year: currentYear, month: currentMonth, records: records })
  })
  .then(function() { saving = false; showToast('保存しました'); updatePaidDisplay(); })
  .catch(function() { saving = false; showToast('保存に失敗しました'); });
}

function changeMonth(d) {
  currentMonth += d;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  loadFromStorage();
}

function getDaysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function getDayOfWeek(y, m, d) { return new Date(y, m, d).getDay(); }

function parseTime(t) {
  if (!t) return null;
  var m = t.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  var h = parseInt(m[1]), min = parseInt(m[2]);
  if (h < 0 || h > 29 || min < 0 || min > 59) return null;
  return h * 60 + min;
}

function fmtWorkTime(mins) {
  if (!mins || mins <= 0) return '-';
  var h = Math.floor(mins / 60), m = mins % 60;
  if (h === 0) return m + '分';
  if (m === 0) return h + '時間';
  return h + '時間' + m + '分';
}
function fmtOT(mins) {
  if (mins <= 0) return '-';
  var h = Math.floor(mins / 60), m = mins % 60;
  if (h === 0) return '+' + m + '分';
  if (m === 0) return '+' + h + '時間';
  return '+' + h + '時間' + m + '分';
}
function calcAwayMins(awayList) {
  var total = 0;
  for (var i = 0; i < (awayList || []).length; i++) {
    var s = parseTime(awayList[i].start), e = parseTime(awayList[i].end);
    if (s !== null && e !== null && e > s) total += e - s;
  }
  return total;
}
function calcDay(rec, stdH) {
  if (rec.type === 'paid') return { work: Math.round(stdH * 60), ot: 0, away: 0, valid: true };
  if (rec.type === 'holiday' || !rec.start || !rec.end) return { work: 0, ot: 0, away: 0, valid: false };
  var s = parseTime(rec.start), e = parseTime(rec.end);
  if (s === null || e === null) return { work: 0, ot: 0, away: 0, valid: false };
  var brk = parseInt(rec.break || 60);
  var awayMins = calcAwayMins(rec.away);
  var work = Math.max(0, e - s - brk - awayMins);
  var ot = Math.max(0, work - Math.round(stdH * 60));
  return { work: work, ot: ot, away: awayMins, valid: true };
}

function applyBulk() {
  var newStart = document.getElementById('bulkStart').value.trim();
  var newEnd   = document.getElementById('bulkEnd').value.trim();
  if (parseTime(newStart) === null || parseTime(newEnd) === null) { showToast('時刻の形式が正しくありません（例: 08:30）'); return; }
  var weekdayOnly = document.getElementById('bulkWeekday').checked;
  var skipNonWork = document.getElementById('bulkSkipHoliday').checked;
  var days = getDaysInMonth(currentYear, currentMonth), count = 0;
  for (var d = 1; d <= days; d++) {
    var dow = getDayOfWeek(currentYear, currentMonth, d);
    var isWeekend = dow === 0 || dow === 6;
    if (weekdayOnly && isWeekend) continue;
    var key = '' + d;
    if (!records[key]) records[key] = { type: isWeekend ? 'holiday' : 'work', start: '09:00', end: '18:00', break: '60', away: [] };
    if (skipNonWork && records[key].type !== 'work') continue;
    records[key].start = newStart; records[key].end = newEnd; count++;
  }
  saveToStorage(); render();
  showToast(count + '日分を ' + newStart + '〜' + newEnd + ' に変更しました');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2600);
}
function autoColon(input) {
  var v = input.value.replace(/[^0-9:]/g, '');
  if (v.length === 4 && !v.includes(':')) v = v.slice(0,2) + ':' + v.slice(2);
  input.value = v;
}
function setTimeField(d, field, value) {
  if (!records[d]) records[d] = {};
  records[d][field] = value.trim();
  saveToStorage(); render();
}
function setField(d, field, value) {
  if (!records[d]) records[d] = {};
  records[d][field] = value;
  saveToStorage(); render();
}
function addAway(d) {
  if (!records[d]) records[d] = {};
  if (!records[d].away) records[d].away = [];
  records[d].away.push({ start: '', end: '' });
  saveToStorage(); render();
}
function delAway(d, i) {
  if (!records[d] || !records[d].away) return;
  records[d].away.splice(i, 1);
  saveToStorage(); render();
}
function setAway(d, i, field, value) {
  if (!records[d] || !records[d].away || !records[d].away[i]) return;
  records[d].away[i][field] = value.trim();
  saveToStorage(); render();
}

function render() {
  var days = getDaysInMonth(currentYear, currentMonth);
  var months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent = currentYear + '年 ' + months[currentMonth];
  var stdH = parseFloat(document.getElementById('stdHours').value || 8);
  var rate = parseFloat(document.getElementById('hourlyRate').value || 1500);
  var totalDays = 0, totalWorkMins = 0, totalOTMins = 0, totalPay = 0;
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  var dowLabels = ['日','月','火','水','木','金','土'];

  for (var d = 1; d <= days; d++) {
    var dow = getDayOfWeek(currentYear, currentMonth, d);
    var isWeekend = dow === 0 || dow === 6;
    var key = '' + d;
    if (!records[key]) records[key] = { type: isWeekend ? 'holiday' : 'work', start: '09:00', end: '18:00', break: '60', away: [] };
    var rec = records[key];
    if (!rec.away) rec.away = [];
    var res = calcDay(rec, stdH);
    if (rec.type === 'work' && res.valid) { totalDays++; totalWorkMins += res.work; totalOTMins += res.ot; }
    if (rec.type === 'paid') { totalDays++; totalWorkMins += Math.round(stdH * 60); }
    var payDay = rec.type === 'paid' ? rate * stdH : (res.work > 0 ? rate * (res.work / 60) : 0);
    totalPay += payDay;
    var startErr = rec.type === 'work' && rec.start && parseTime(rec.start) === null;
    var endErr   = rec.type === 'work' && rec.end   && parseTime(rec.end)   === null;
    var typeSel = '<select onchange="setField(' + d + ',\'type\',this.value)">'
      + '<option value="work"'    + (rec.type==='work'?    ' selected':'') + '>出勤</option>'
      + '<option value="paid"'    + (rec.type==='paid'?    ' selected':'') + '>有給</option>'
      + '<option value="holiday"' + (rec.type==='holiday'? ' selected':'') + '>休日</option>'
      + '</select>';
    var awayHtml = '<div class="away-wrap">';
    rec.away.forEach(function(a, i) {
      var asErr = a.start && parseTime(a.start) === null;
      var aeErr = a.end   && parseTime(a.end)   === null;
      awayHtml += '<div class="away-pair">'
        + '<input class="time-input' + (asErr ? ' error' : '') + '" type="text" value="' + (a.start||'') + '" placeholder="12:00" maxlength="5"'
        + ' onblur="setAway(' + d + ',' + i + ',\'start\',this.value)" oninput="autoColon(this)" onfocus="this.select()">'
        + '<span class="away-sep">〜</span>'
        + '<input class="time-input' + (aeErr ? ' error' : '') + '" type="text" value="' + (a.end||'') + '" placeholder="13:00" maxlength="5"'
        + ' onblur="setAway(' + d + ',' + i + ',\'end\',this.value)" oninput="autoColon(this)" onfocus="this.select()">'
        + '<button class="btn-del-away" onclick="delAway(' + d + ',' + i + ')">×</button>'
        + '</div>';
    });
    if (res.away > 0) awayHtml += '<span class="away-total">(' + fmtWorkTime(res.away) + ')</span>';
    awayHtml += '<button class="btn-add-away" onclick="addAway(' + d + ')"><i class="ti ti-plus" style="font-size:11px;"></i> 追加</button></div>';
    var tr = document.createElement('tr');
    if (isWeekend && rec.type !== 'work') tr.style.opacity = '0.5';
    if (rec.type === 'work') {
      tr.innerHTML = '<td>' + (currentMonth+1) + '/' + d + '(' + dowLabels[dow] + ')</td>'
        + '<td>' + typeSel + '</td>'
        + '<td><input class="time-input' + (startErr?' error':'') + '" type="text" value="' + (rec.start||'') + '" placeholder="09:00" maxlength="5"'
        + ' onblur="setTimeField(' + d + ',\'start\',this.value)" oninput="autoColon(this)" onfocus="this.select()"></td>'
        + '<td><input class="time-input' + (endErr?' error':'') + '" type="text" value="' + (rec.end||'') + '" placeholder="18:00" maxlength="5"'
        + ' onblur="setTimeField(' + d + ',\'end\',this.value)" oninput="autoColon(this)" onfocus="this.select()"></td>'
        + '<td><input class="break-input" type="number" value="' + (rec.break||60) + '" min="0" max="240" step="5"'
        + ' onchange="setField(' + d + ',\'break\',this.value)"></td>'
        + '<td>' + awayHtml + '</td>'
        + '<td>' + fmtWorkTime(res.work) + '</td>'
        + '<td>' + (res.ot > 0 ? '<span class="overtime-cell">' + fmtOT(res.ot) + '</span>' : '-') + '</td>';
    } else {
      tr.innerHTML = '<td>' + (currentMonth+1) + '/' + d + '(' + dowLabels[dow] + ')</td>'
        + '<td>' + typeSel + '</td>'
        + '<td colspan="4" style="color:var(--text3); font-size:11px; text-align:center;">-</td>'
        + '<td>' + (rec.type==='paid' ? fmtWorkTime(Math.round(stdH*60)) : '-') + '</td>'
        + '<td>-</td>';
    }
    tbody.appendChild(tr);
  }

  document.getElementById('sumDays').textContent = totalDays;
  document.getElementById('sumHours').textContent = (totalWorkMins / 60).toFixed(1);
  var otH = Math.floor(totalOTMins / 60), otM = totalOTMins % 60;
  var otLabel = otH > 0 ? otH + '時間' + otM + '分' : otM + '分';
  document.getElementById('sumOT').textContent = otLabel;
  document.getElementById('sumPay').textContent = Math.round(totalPay).toLocaleString();
  var pct = Math.min(100, (totalOTMins / 2700) * 100);
  var bar = document.getElementById('otBar');
  bar.style.width = pct + '%';
  bar.className = 'bar-fill' + (pct >= 80 ? ' danger' : pct >= 50 ? ' warn' : '');
  document.getElementById('otBarLabel').textContent = otLabel + ' / 45時間 (' + pct.toFixed(0) + '%)';
}

document.addEventListener('input', function(e) {
  if (e.target.id === 'hourlyRate' || e.target.id === 'stdHours') {
    saveSettings(); render();
  }
});

function resetAllData() {
  if (!confirm('すべてのデータを削除します。この操作は元に戻せません。本当によいですか？')) return;
  if (!confirm('本当に削除します。よろしいですか？')) return;
  localStorage.removeItem('kintai_records');
  localStorage.removeItem('kintai_settings');
  localStorage.removeItem('kintai_paid');
  records = {};
  document.getElementById('hourlyRate').value = 1500;
  document.getElementById('stdHours').value = 8;
  document.getElementById('paidCarry').value = 0;
  document.getElementById('paidGrant').value = 0;
  saveToStorage();
  saveSettings();
  savePaidSettings();
  render();
  updatePaidDisplay();
  showToast('リセットしました');
}

init();
</script>
</body>
</html>
